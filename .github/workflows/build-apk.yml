name: Construire l'APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Composants SDK
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null 2>&1 || true

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Construire les 3 APK (debug)
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Préparer les APK
        run: |
          cp android/app/build/outputs/apk/chauffeur/debug/app-chauffeur-debug.apk   taxi-chauffeur.apk
          cp android/app/build/outputs/apk/patron/debug/app-patron-debug.apk         taxi-patron.apk
          cp android/app/build/outputs/apk/superadmin/debug/app-superadmin-debug.apk taxi-admin.apk
          ls -lh taxi-*.apk

      - name: Artefacts
        uses: actions/upload-artifact@v4
        with:
          name: taxi-apks
          path: |
            taxi-chauffeur.apk
            taxi-patron.apk
            taxi-admin.apk

      - name: Publier la release (téléchargeable sur le téléphone)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Taxi — 3 APK (chauffeur, patron, admin)
          body: |
            3 apps installables côte à côte sur Android (autoriser « sources inconnues ») :
            • **taxi-chauffeur.apk** — carnet + taximètre (hors-ligne)
            • **taxi-patron.apk** — ta flotte : plaques, carte GPS, réglages, chauffeurs
            • **taxi-admin.apk** — super-admin : vue d'ensemble, carte globale, comptes
            Reconstruites automatiquement à chaque mise à jour.
          files: |
            taxi-chauffeur.apk
            taxi-patron.apk
            taxi-admin.apk
