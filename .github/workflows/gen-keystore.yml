name: Générer le keystore stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Générer le keystore si absent
        run: |
          if [ ! -f android/app/signing/taxi.keystore ]; then
            mkdir -p android/app/signing
            keytool -genkeypair -v \
              -keystore android/app/signing/taxi.keystore \
              -storepass taxicopilote -keypass taxicopilote \
              -alias taxi -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Taxi Copilote, O=Taxi Recettes, C=BE"
            echo "keystore généré"
          else
            echo "keystore déjà présent"
          fi

      - name: Committer le keystore
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f android/app/signing/taxi.keystore
          git commit -m "Keystore stable (maj de l'app sans desinstallation)" || echo "rien a committer"
          git push
