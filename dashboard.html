<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Taxi Recettes — Espaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#FAF5EC; --surface:#FFF; --ink:#241C12; --muted:#7C6F5B; --brand:#B14A28; --line:#EAE0CE;
    --serif:"Fraunces",Georgia,serif; --sans:"Inter",ui-sans-serif,system-ui,sans-serif; }
  @media (prefers-color-scheme:dark){ :root{ --bg:#17130E; --surface:#201A12; --ink:#F0E9DC; --muted:#A99A82; --brand:#D2622F; --line:#33291B; } }
  *{box-sizing:border-box} body{margin:0;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:var(--bg);color:var(--ink);font-family:var(--sans)}
  .box{width:100%;max-width:400px;text-align:center}
  .m{width:56px;height:56px;border-radius:15px;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:600;font-size:30px;margin:0 0 4px}
  p{color:var(--muted);margin:0 0 22px}
  a.choice{display:flex;align-items:center;gap:12px;text-align:left;text-decoration:none;color:var(--ink);
    background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:12px;font-weight:600;font-size:16px}
  a.choice:hover{border-color:var(--brand)}
  a.choice .ico{font-size:22px}
  a.choice .sub{display:block;font-weight:400;font-size:13px;color:var(--muted);margin-top:2px}
  .small{font-size:13px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
  <div class="box">
    <div class="m"><svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg></div>
    <h1>Taxi Recettes</h1>
    <p>Choisis ton espace</p>
    <a class="choice" href="admin.html"><span class="ico">👑</span><span>Super-Admin<span class="sub">Flottes, options, comptes</span></span></a>
    <a class="choice" href="patron.html"><span class="ico">🏢</span><span>Patron de flotte<span class="sub">Plaques, carte GPS, réglages, chauffeurs</span></span></a>
    <p class="small">🚕 Chauffeur ? Utilise l'application mobile.</p>
  </div>
<script>
/* Si déjà connecté, aiguille directement vers le bon espace */
try{
  var s=JSON.parse(localStorage.getItem('taxiDashAuthV1')||'null');
  var r=s&&s.profile&&s.profile.role;
  if(r==='superadmin') location.replace('admin.html');
  else if(r==='patron') location.replace('patron.html');
}catch(e){}
</script>
</body>
</html>
